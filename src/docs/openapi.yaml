openapi: 3.0.0
info:
  title: Playenest API
  description: API Documentation for Playenest Gamenet Management System
  version: v1.0-LOCKED
  x-api-contract-version: v1.0-LOCKED
  contact:
    name: Playenest Support
    email: support@playenest.com

servers:
  - url: /api/v1
    description: V1 API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              description: Unique error code for machine handling
              enum:
                - INTERNAL_ERROR
                - APP_ERROR
                - VALIDATION_ERROR
                - DB_REQUEST_FAILED
                - NOT_FOUND
                - CONFLICT
                - UNAUTHORIZED
                - FORBIDDEN
                - SLOT_NOT_AVAILABLE
                - RESERVATION_OVERLAP
                - OVERLAP_CONFLICT
                - RESERVATION_START_TIME_IN_PAST
                - INVALID_TRANSITION
                - ONLINE_RESERVATION_DISABLED
                - IDEMPOTENCY_KEY_REQUIRED
                - IDEMPOTENCY_KEY_INVALID_LENGTH
                - IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_PAYLOAD
                - IDEMPOTENCY_REQUEST_IN_PROGRESS
              example: "VALIDATION_ERROR"
            message:
              type: string
              description: Human-readable error message
              example: "Invalid request payload."
            details:
              type: object
              description: Optional additional error details (e.g., validation issues)
              nullable: true
        meta:
          $ref: '#/components/schemas/Meta'

    Success:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          $ref: '#/components/schemas/Meta'

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [MANAGER, SUPERVISOR, STAFF, TRAINEE]
        isActive:
          type: boolean

    GamingCenter:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        isActive:
          type: boolean
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    GameStation:
      type: object
      properties:
        id:
          type: string
        gamingCenterId:
          type: string
        name:
          type: string
        stationType:
          type: string
          enum: [PC, PLAYSTATION, XBOX, SWITCH, VR]
        isVip:
          type: boolean
        hourlyPrice:
          type: number
        minRentHours:
          type: integer
        maxRentHours:
          type: integer
        defaultDurationHours:
          type: integer
        incrementMinutes:
          type: integer
        isActive:
          type: boolean

    Reservation:
      type: object
      properties:
        id:
          type: string
        gamingCenterId:
          type: string
        stationId:
          type: string
        staffId:
          type: string
        customerAccountId:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELED, NO_SHOW]
        paymentState:
          type: string
          enum: [UNPAID, PENDING, PARTIALLY_PAID, PAID, REFUNDED, OVERPAID, FAILED, CANCELED]
        totalHours:
          type: number
        totalPrice:
          type: number
        stationSnapshot:
          type: object
          properties:
            name:
              type: string
            hourlyPrice:
              type: number
            stationType:
              type: string

    Staff:
      type: object
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            isPublic:
              type: boolean
            publicName:
              type: string
            bio:
              type: string
            avatarUrl:
              type: string

    Customer:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        fullName:
          type: string
        phoneVerifiedAt:
          type: string
          format: date-time

    Meta:
      type: object
      properties:
        requestId:
          type: string
          example: "ckv1abc..."
        pagination:
          type: object
          properties:
            total:
              type: integer
            totalItems:
              type: integer
            page:
              type: integer
            pageSize:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer

    Pagination:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        meta:
          $ref: '#/components/schemas/Meta'

    Settings:
      type: object
      properties:
        id:
          type: string
        gamingCenterId:
          type: string
        timeZone:
          type: string
        workStartTime:
          type: string
        workEndTime:
          type: string
        allowOnlineBooking:
          type: boolean
        onlineBookingAutoConfirm:
          type: boolean
        preventOverlaps:
          type: boolean

    SiteSettings:
      type: object
      properties:
        logoUrl:
          type: string
        faviconUrl:
          type: string
        defaultSeoTitle:
          type: string
        defaultSeoDescription:
          type: string
        robotsIndex:
          type: string
          enum: [INDEX, NOINDEX]
        robotsFollow:
          type: string
          enum: [FOLLOW, NOFOLLOW]

    CommissionPolicy:
      type: object
      properties:
        id:
          type: string
        gamingCenterId:
          type: string
        type:
          type: string
          enum: [PERCENT, FIXED]
        percentBps:
          type: integer
        fixedAmount:
          type: integer
        currency:
          type: string
        isActive:
          type: boolean

    Earning:
      type: object
      properties:
        id:
          type: string
        reservationId:
          type: string
        gamingCenterId:
          type: string
        status:
          type: string
          enum: [PENDING, ACCRUED, CHARGED, WAIVED, REFUNDED]
        commissionAmount:
          type: integer
        currency:
          type: string

    Rating:
      type: object
      properties:
        id:
          type: string
        gamingCenterId:
          type: string
        reservationId:
          type: string
        rating:
          type: integer
        comment:
          type: string
        status:
          type: string
          enum: [PUBLISHED, HIDDEN, DELETED]

paths:
  /health:
    get:
      summary: Health Check
      tags:
        - System
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/reservations/{reservationId}/sessions/pause:
    post:
      summary: Pause a gaming session for a reservation
      tags:
        - GamingSessions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/reservations/{reservationId}/sessions/resume:
    post:
      summary: Resume a gaming session for a reservation
      tags:
        - GamingSessions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/analytics/summary:
    get:
      summary: Get analytics summary
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /gamingCenters/{gamingCenterId}/analytics/staff:
    get:
      summary: Get staff performance analytics
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Staff performance data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/analytics/stations:
    get:
      summary: Get station performance analytics
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: GameStation performance data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/analytics/revenue-chart:
    get:
      summary: Get revenue chart data
      tags:
        - Analytics
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Revenue over time data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/settings:
    get:
      summary: Get gamingCenter settings
      tags:
        - Settings
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GamingCenter settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    put:
      summary: Update gamingCenter settings
      tags:
        - Settings
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                timeZone:
                  type: string
                workStartTime:
                  type: string
                workEndTime:
                  type: string
                allowOnlineBooking:
                  type: boolean
                onlineBookingAutoConfirm:
                  type: boolean
                preventOverlaps:
                  type: boolean
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/commissions:
    get:
      summary: List reservation earnings (commissions)
      tags:
        - Commissions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACCRUED, CHARGED, WAIVED, REFUNDED]
      responses:
        '200':
          description: List of earnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagination'

  /gamingCenters/{gamingCenterId}/commissions/policy:
    get:
      summary: Get commission policy
      tags:
        - Commissions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    post:
      summary: Upsert commission policy
      tags:
        - Commissions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [PERCENT, FIXED]
                percentBps:
                  type: integer
                fixedAmount:
                  type: integer
                currency:
                  type: string
                applyToOnlineOnly:
                  type: boolean
                minimumFeeAmount:
                  type: integer
                isActive:
                  type: boolean
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/commissions/{earningId}/pay:
    post:
      summary: Record commission payment
      tags:
        - Commissions
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: earningId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - currency
              properties:
                amount:
                  type: integer
                currency:
                  type: string
                status:
                  type: string
                  enum: [PENDING, PAID, VOID, REFUNDED]
                  default: PAID
                method:
                  type: string
                  enum: [CASH, CARD, ONLINE, TRANSFER]
                referenceCode:
                  type: string
                paidAt:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/audit-logs:
    get:
      summary: List audit logs
      tags:
        - Audit
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: entity
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagination'

  /gamingCenters/{gamingCenterId}/site-settings:
    get:
      summary: Get site settings
      tags:
        - CMS
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Site settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
    patch:
      summary: Update site settings
      tags:
        - CMS
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                logoUrl:
                  type: string
                faviconUrl:
                  type: string
                defaultSeoTitle:
                  type: string
                defaultSeoDescription:
                  type: string
                robotsIndex:
                  type: string
                  enum: [INDEX, NOINDEX]
                robotsFollow:
                  type: string
                  enum: [FOLLOW, NOFOLLOW]
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/ratings/{id}/status:
    patch:
      summary: Moderate a review (status update)
      tags:
        - Ratings
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [PUBLISHED, HIDDEN, DELETED]
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}:
    get:
      summary: Get public gaming center info
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Gaming center details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/pages/{pageSlug}:
    get:
      summary: Get a public page by slug
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
        - name: pageSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Page details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/media:
    get:
      summary: Get public media
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/links:
    get:
      summary: Get public social links
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Links list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/addresses:
    get:
      summary: Get public addresses
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/ratings:
    get:
      summary: List public ratings
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ratings list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /public/gamingCenters/{gamingCenterSlug}/reservation/{reservationId}/ratings:
    post:
      summary: Submit a review
      tags:
        - Public
      parameters:
        - name: gamingCenterSlug
          in: path
          required: true
          schema:
            type: string
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/media/upload:
    post:
      summary: Upload an image
      tags:
        - CMS
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                purpose:
                  type: string
                  enum: [COVER, GALLERY, STATION, LOGO]
                altText:
                  type: string
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/customers:
    get:
      summary: List customers for a gamingCenter
      tags:
        - Customers
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagination'
    post:
      summary: Create or link a customer
      tags:
        - Customers
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                fullName:
                  type: string
                displayName:
                  type: string
                note:
                  type: string
      responses:
        '201':
          description: Customer created or linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'

  /gamingCenters/{gamingCenterId}/customers/{customerId}:
    patch:
      summary: Update customer profile
      tags:
        - Customers
      security:
        - bearerAuth: []
      parameters:
        - name: gamingCenterId
          in: path
          required: true
          schema:
            type: string
        - name: customerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                note:
                  type: string
                fullName:
                  type: string
      responses:
        '200':
          description: Customer updated
          content:
            application/json:
